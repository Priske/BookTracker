name: dotnet-ci

on:
  push:
  pull_request:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet test BookTracker.Api.Tests/BookTracker.Api.Tests.csproj --no-restore

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet test BookTracker.Api.IntegrationTests/BookTracker.Api.IntegrationTests.csproj --no-restore
